<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PV Meeting - Transcription Groq</title>

<!-- ✅ CORRECTION : unpkg à la place de jsdelivr (compatible GitHub Pages) -->
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/umd/ffmpeg.js"></script>
<script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/index.js"></script>

<style>

body{
    margin:0;
    padding:40px;
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
}

.container{
    max-width:1000px;
    margin:auto;
    background:#111827;
    padding:30px;
    border-radius:20px;
}

h1{
    color:#38bdf8;
}

.field{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input[type="password"],
input[type="file"]{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #334155;
    background:#1e293b;
    color:white;
    box-sizing:border-box;
}

button{
    background:#0ea5e9;
    color:white;
    border:none;
    padding:14px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
}

button:hover{
    background:#0284c7;
}

#apiBadge{
    display:inline-block;
    margin-top:10px;
    padding:8px 12px;
    border-radius:999px;
    background:#dc2626;
    font-size:14px;
    font-weight:bold;
}

.status{
    margin-top:20px;
    color:#cbd5e1;
}

.success{
    color:#22c55e;
}

.error{
    color:#ef4444;
}

textarea{
    width:100%;
    min-height:450px;
    margin-top:20px;
    padding:15px;
    border-radius:12px;
    border:1px solid #334155;
    background:#020617;
    color:#e2e8f0;
    resize:vertical;
    box-sizing:border-box;
}

#liveCursor{
    display:none;
    margin-top:10px;
    color:#38bdf8;
    font-weight:bold;
}

.progressBar{
    width:100%;
    height:20px;
    background:#1e293b;
    border-radius:999px;
    overflow:hidden;
    margin-top:20px;
}

.progressFill{
    height:100%;
    width:0%;
    background:#0ea5e9;
    transition:width .3s;
}

</style>

</head>

<body>

<div class="container">

<h1>🎙️ PV Meeting - Transcription Longue</h1>

<div class="field">

<label>Clé API Groq</label>

<input
    id="groqApiKey"
    type="password"
    placeholder="gsk_..."
>

<div id="apiBadge">
API invalide
</div>

</div>

<div class="field">

<label>Clé API Anthropic (optionnel)</label>

<input
    id="anthropicApiKey"
    type="password"
    placeholder="sk-ant-..."
>

</div>

<div class="field">

<label>Fichier audio / vidéo</label>

<input
    id="audioFile"
    type="file"
    accept="audio/*,video/*"
>

</div>

<button id="startBtn">
Lancer la transcription
</button>

<div class="status" id="status"></div>

<div id="liveCursor">
⏺ Transcription en cours...
</div>

<div class="progressBar">
<div class="progressFill" id="progressFill"></div>
</div>

<textarea
    id="result"
    placeholder="La transcription apparaîtra ici..."
></textarea>

</div>

<script>

const { fetchFile } = FFmpegUtil;

function setStatus(message,type=''){

    const el =
        document.getElementById('status');

    el.className = `status ${type}`;
    el.textContent = message;
}

function updateProgress(percent){

    document
        .getElementById('progressFill')
        .style.width = percent + '%';
}

function updateApiBadge(ok,message=''){

    const badge =
        document.getElementById('apiBadge');

    badge.textContent =
        message ||
        (ok ? 'Groq connecté' : 'API invalide');

    badge.style.background =
        ok ? '#16a34a' : '#dc2626';
}

function getGroqKey(){

    return document
        .getElementById('groqApiKey')
        .value
        .trim();
}

function getAnthropicKey(){

    return document
        .getElementById('anthropicApiKey')
        .value
        .trim();
}

async function validateGroqKey(){

    const apiKey = getGroqKey();

    if(!apiKey){

        updateApiBadge(false,'Clé manquante');
        return false;
    }

    try{

        const response = await fetch(
            'https://api.groq.com/openai/v1/models',
            {
                method:'GET',
                headers:{
                    Authorization:`Bearer ${apiKey}`
                }
            }
        );

        if(!response.ok){

            updateApiBadge(false,'Clé refusée');
            return false;
        }

        updateApiBadge(true,'Groq connecté');

        return true;

    }catch(err){

        console.error(err);

        updateApiBadge(false,'Erreur réseau');

        return false;
    }
}

function animateLiveCursor(){

    const cursor =
        document.getElementById('liveCursor');

    cursor.style.display='block';

    let dots=0;

    window.__cursorInterval =
        setInterval(()=>{

            dots=(dots+1)%4;

            cursor.textContent =
                '⏺ Transcription en cours'
                + '.'.repeat(dots);

        },500);
}

function stopLiveCursor(){

    clearInterval(window.__cursorInterval);

    document
        .getElementById('liveCursor')
        .style.display='none';
}

async function sendChunkToGroq(file){

    const apiKey = getGroqKey();

    const formData = new FormData();

    formData.append('file',file);

    formData.append(
        'model',
        'whisper-large-v3'
    );

    formData.append(
        'response_format',
        'verbose_json'
    );

    const response = await fetch(
        'https://api.groq.com/openai/v1/audio/transcriptions',
        {
            method:'POST',
            headers:{
                Authorization:`Bearer ${apiKey}`
            },
            body:formData
        }
    );

    if(!response.ok){

        console.error(
            await response.text()
        );

        throw new Error(
            `Erreur Groq ${response.status}`
        );
    }

    return await response.json();
}

async function splitAndTranscribe(file){

    const ffmpeg =
        new window.FFmpegWASM.FFmpeg();

    setStatus(
        'Chargement moteur FFmpeg...'
    );

    // ✅ CORRECTION : unpkg à la place de jsdelivr
    await ffmpeg.load({
        coreURL:
        'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.js',

        wasmURL:
        'https://unpkg.com/@ffmpeg/core@0.12.6/dist/umd/ffmpeg-core.wasm'
    });

    setStatus(
        'Chargement fichier vidéo/audio...'
    );

    await ffmpeg.writeFile(
        file.name,
        await fetchFile(file)
    );

    setStatus(
        'Extraction audio MP3...'
    );

    await ffmpeg.exec([
        '-i',
        file.name,
        '-vn',
        '-acodec',
        'libmp3lame',
        '-b:a',
        '128k',
        'audio.mp3'
    ]);

    setStatus(
        'Découpage automatique...'
    );

    await ffmpeg.exec([
        '-i',
        'audio.mp3',
        '-f',
        'segment',
        '-segment_time',
        '300',
        '-c',
        'copy',
        'chunk_%03d.mp3'
    ]);

    const dir =
        await ffmpeg.listDir('/');

    const chunks =
        dir
        .map(f=>f.name)
        .filter(name=>
            name.startsWith('chunk_')
        );

    let finalText='';

    for(let i=0;i<chunks.length;i++){

        const percent =
            Math.floor(
                ((i+1)/chunks.length)*100
            );

        updateProgress(percent);

        setStatus(
            `Transcription ${i+1}/${chunks.length}...`
        );

        const data =
            await ffmpeg.readFile(
                chunks[i]
            );

        const blob =
            new Blob(
                [data.buffer],
                {type:'audio/mp3'}
            );

        const chunkFile =
            new File(
                [blob],
                chunks[i],
                {type:'audio/mp3'}
            );

        const json =
            await sendChunkToGroq(
                chunkFile
            );

        finalText +=
            '\n' + (json.text || '');

        document
            .getElementById('result')
            .value = finalText;

        document
            .getElementById('result')
            .scrollTop =
                document
                    .getElementById('result')
                    .scrollHeight;
    }

    return finalText;
}

async function startTranscription(){

    try{

        const fileInput =
            document.getElementById(
                'audioFile'
            );

        if(!fileInput.files.length){

            alert(
                'Sélectionne un fichier'
            );

            return;
        }

        const valid =
            await validateGroqKey();

        if(!valid){

            throw new Error(
                'Clé Groq invalide'
            );
        }

        animateLiveCursor();

        const file =
            fileInput.files[0];

        const finalText =
            await splitAndTranscribe(file);

        document
            .getElementById('result')
            .value = finalText;

        stopLiveCursor();

        updateProgress(100);

        setStatus(
            'Transcription terminée ✅',
            'success'
        );

    }catch(err){

        console.error(err);

        stopLiveCursor();

        setStatus(
            err.message || 'Erreur',
            'error'
        );
    }
}

window.addEventListener(
    'DOMContentLoaded',
    ()=>{

        document
            .getElementById(
                'startBtn'
            )
            .addEventListener(
                'click',
                startTranscription
            );

        document
            .getElementById(
                'groqApiKey'
            )
            .addEventListener(
                'input',
                ()=>{

                    clearTimeout(
                        window.__groqTimer
                    );

                    window.__groqTimer =
                        setTimeout(()=>{

                            validateGroqKey();

                        },500);
                }
            );
    }
);

</script>

</body>
</html>
