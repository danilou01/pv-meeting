<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>PV Meeting - Transcription Groq</title>

<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>

<style>

body{
    margin:0;
    padding:40px;
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
}

.container{
    max-width:1000px;
    margin:auto;
    background:#111827;
    padding:30px;
    border-radius:20px;
}

h1{
    color:#38bdf8;
}

.field{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input[type="password"],
input[type="file"]{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #334155;
    background:#1e293b;
    color:white;
    box-sizing:border-box;
}

.btn-row{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

button{
    background:#0ea5e9;
    color:white;
    border:none;
    padding:14px 20px;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:all .2s ease;
}

button:hover{
    background:#0284c7;
}

button:disabled{
    background:#334155;
    color:#64748b;
    cursor:not-allowed;
}

#pauseBtn{
    background:#f59e0b;
}

#pauseBtn:hover:not(:disabled){
    background:#d97706;
}

#pauseBtn.resuming{
    background:#22c55e;
}

#pauseBtn.resuming:hover:not(:disabled){
    background:#16a34a;
}

#apiBadge{
    display:inline-block;
    margin-top:10px;
    padding:8px 12px;
    border-radius:999px;
    background:#dc2626;
    font-size:14px;
    font-weight:bold;
}

.status{
    margin-top:20px;
    color:#cbd5e1;
}

.success{
    color:#22c55e;
}

.error{
    color:#ef4444;
}

.debug{
    margin-top:10px;
    padding:10px;
    background:#1e293b;
    border-radius:8px;
    font-size:13px;
    color:#94a3b8;
    max-height:180px;
    overflow-y:auto;
    font-family:monospace;
}

textarea{
    width:100%;
    min-height:450px;
    margin-top:20px;
    padding:15px;
    border-radius:12px;
    border:1px solid #334155;
    background:#020617;
    color:#e2e8f0;
    resize:vertical;
    box-sizing:border-box;
}

#liveCursor{
    display:none;
    margin-top:10px;
    color:#38bdf8;
    font-weight:bold;
}

.progressBar{
    width:100%;
    height:20px;
    background:#1e293b;
    border-radius:999px;
    overflow:hidden;
    margin-top:20px;
}

.progressFill{
    height:100%;
    width:0%;
    background:#0ea5e9;
    transition:width .3s;
}

/* TELECHARGEMENT */

#downloadBtn{
    background:linear-gradient(135deg,#22c55e,#16a34a);
    color:white;
    font-size:15px;
    font-weight:bold;
    padding:12px 18px;
    border-radius:12px;
    border:2px solid #4ade80;
    box-shadow:
        0 6px 18px rgba(34,197,94,0.25);
    transition:all .2s ease;
    animation:pulseDownload 2.5s infinite;
}

#downloadBtn:hover:not(:disabled){
    transform:translateY(-1px);
    background:linear-gradient(135deg,#16a34a,#15803d);
}

#downloadBtn:disabled{
    background:#334155;
    border:2px solid #475569;
    box-shadow:none;
    animation:none;
}

@keyframes pulseDownload{

    0%{
        box-shadow:
            0 0 0 0 rgba(34,197,94,0.35),
            0 6px 18px rgba(34,197,94,0.25);
    }

    70%{
        box-shadow:
            0 0 0 8px rgba(34,197,94,0),
            0 6px 18px rgba(34,197,94,0.25);
    }

    100%{
        box-shadow:
            0 0 0 0 rgba(34,197,94,0),
            0 6px 18px rgba(34,197,94,0.25);
    }
}

/* ANALYSE */

#analyseSection{
    margin-top:30px;
    border-top:1px solid #1e293b;
    padding-top:30px;
}

#analyseBtn{
    background:#8b5cf6;
}

#analyseBtn:hover:not(:disabled){
    background:#7c3aed;
}

.analyse-result{
    display:none;
    margin-top:20px;
}

.analyse-block{
    background:#1e293b;
    border-radius:12px;
    padding:20px;
    margin-bottom:16px;
}

.analyse-block h3{
    margin:0 0 14px 0;
    font-size:15px;
}

.analyse-block .content{
    color:#cbd5e1;
    font-size:14px;
    line-height:1.7;
    white-space:pre-wrap;
}

</style>
</head>

<body>

<div class="container">

<h1>🎙️ PV Meeting - Transcription Longue</h1>

<div class="field">
<label>Clé API Groq</label>

<input
id="groqApiKey"
type="password"
placeholder="gsk_..."
>

<div id="apiBadge">
API invalide
</div>
</div>

<div class="field">

<label>Fichier audio / vidéo</label>

<input
id="audioFile"
type="file"
accept="audio/*,video/*"
>

</div>

<div class="btn-row">

<button id="startBtn">
▶ Lancer la transcription
</button>

<button id="pauseBtn" disabled>
⏸ Pause
</button>

</div>

<div class="status" id="status"></div>

<div id="liveCursor">
⏺ Transcription en cours...
</div>

<div class="progressBar">
<div class="progressFill" id="progressFill"></div>
</div>

<div class="debug" id="debugLog">
📋 Journal de bord...
</div>

<div style="
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
margin-top:20px;
">

<label for="importTxt" style="margin:0;">

<span style="
display:inline-block;
background:#0f766e;
color:white;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
font-size:14px;
font-weight:bold;
">
📂 Charger une transcription .txt
</span>

<input
id="importTxt"
type="file"
accept=".txt"
style="display:none;"
>

</label>

<button id="downloadBtn" disabled>
⬇️ Télécharger le .txt
</button>

</div>

<textarea
id="result"
placeholder="La transcription apparaîtra ici..."
></textarea>

<!-- ANALYSE -->

<div id="analyseSection">

<h2 style="color:#38bdf8;">
🧠 Analyse de la réunion
</h2>

<p style="color:#64748b; font-size:13px;">
Analyse optimisée anti dépassement TPM Groq
</p>

<div class="btn-row">

<button id="analyseBtn">
✨ Analyser la transcription
</button>

</div>

<div id="analyseStatus" class="status"></div>

<div class="analyse-result" id="analyseResult">

<div class="analyse-block">
<h3>📋 Résumé</h3>
<div class="content" id="resumeContent"></div>
</div>

<div class="analyse-block">
<h3>✅ Décisions</h3>
<div class="content" id="decisionsContent"></div>
</div>

<div class="analyse-block">
<h3>🎯 Actions</h3>
<div class="content" id="actionsContent"></div>
</div>

</div>
</div>

</div>

<script>

const { createFFmpeg, fetchFile } = FFmpeg;

let isPaused = false;

/* LOG */

function log(msg){

    console.log(msg);

    const el =
        document.getElementById('debugLog');

    el.innerHTML += '<br>' + msg;

    el.scrollTop = el.scrollHeight;
}

/* STATUS */

function setStatus(message, type=''){

    const el =
        document.getElementById('status');

    el.className = `status ${type}`;

    el.textContent = message;

    log('▶ ' + message);
}

/* PROGRESS */

function updateProgress(percent){

    document
        .getElementById('progressFill')
        .style.width = percent + '%';
}

/* API KEY */

function getGroqKey(){

    return document
        .getElementById('groqApiKey')
        .value
        .trim();
}

async function validateGroqKey(){

    const apiKey = getGroqKey();

    if(!apiKey){

        updateBadge(false);

        return false;
    }

    try{

        const response = await fetch(
            'https://api.groq.com/openai/v1/models',
            {
                method:'GET',
                headers:{
                    Authorization:`Bearer ${apiKey}`
                }
            }
        );

        if(!response.ok){

            updateBadge(false);

            return false;
        }

        updateBadge(true);

        return true;

    }catch(err){

        updateBadge(false);

        return false;
    }
}

function updateBadge(ok){

    const badge =
        document.getElementById('apiBadge');

    badge.textContent =
        ok ? 'Groq connecté' : 'API invalide';

    badge.style.background =
        ok ? '#16a34a' : '#dc2626';
}

/* TRANSCRIPTION */

async function sendChunkToGroq(file){

    const apiKey = getGroqKey();

    const formData = new FormData();

    formData.append('file', file);
    formData.append('model', 'whisper-large-v3');
    formData.append('response_format', 'verbose_json');

    const response = await fetch(
        'https://api.groq.com/openai/v1/audio/transcriptions',
        {
            method:'POST',
            headers:{
                Authorization:`Bearer ${apiKey}`
            },
            body:formData
        }
    );

    if(!response.ok){

        const err =
            await response.text();

        throw new Error(err);
    }

    return response.json();
}

async function splitAndTranscribe(file){

    const ffmpeg = createFFmpeg({
        log:false,
        corePath:'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
    });

    setStatus('Chargement FFmpeg...');

    await ffmpeg.load();

    ffmpeg.FS(
        'writeFile',
        file.name,
        await fetchFile(file)
    );

    setStatus('Extraction audio...');

    await ffmpeg.run(
        '-i',
        file.name,
        '-vn',
        '-acodec',
        'pcm_s16le',
        '-ar',
        '16000',
        '-ac',
        '1',
        'audio.wav'
    );

    setStatus('Découpage audio...');

    await ffmpeg.run(
        '-i',
        'audio.wav',
        '-f',
        'segment',
        '-segment_time',
        '300',
        '-c',
        'copy',
        'chunk_%03d.wav'
    );

    const files =
        ffmpeg.FS('readdir', '/');

    const chunks = files
        .filter(name => name.startsWith('chunk_'))
        .sort();

    let finalText = '';

    document.getElementById('pauseBtn')
        .disabled = false;

    for(let i=0; i<chunks.length; i++){

        while(isPaused){

            await new Promise(r=>setTimeout(r,300));
        }

        updateProgress(
            Math.floor(
                ((i+1)/chunks.length)*100
            )
        );

        setStatus(
            `Transcription ${i+1}/${chunks.length}`
        );

        const data =
            ffmpeg.FS('readFile', chunks[i]);

        const blob = new Blob(
            [data.buffer],
            {type:'audio/wav'}
        );

        const chunkFile = new File(
            [blob],
            chunks[i],
            {type:'audio/wav'}
        );

        const json =
            await sendChunkToGroq(chunkFile);

        finalText += '\n' + (json.text || '');

        document.getElementById('result')
            .value = finalText;
    }

    document.getElementById('pauseBtn')
        .disabled = true;

    return finalText;
}

/* ANALYSE */

function splitTextIntoChunks(text, maxChars = 12000){

    const chunks = [];

    let start = 0;

    while(start < text.length){

        chunks.push(
            text.substring(
                start,
                start + maxChars
            )
        );

        start += maxChars;
    }

    return chunks;
}

async function analyseChunk(chunk){

    const groqKey = getGroqKey();

    const prompt = `
Analyse cette transcription de réunion.

Retourne uniquement un JSON valide :

{
  "resume":"Résumé détaillé",
  "decisions":"Décisions importantes",
  "actions":"Actions à mener"
}

TRANSCRIPTION :
${chunk}
`;

    const response = await fetch(
        'https://api.groq.com/openai/v1/chat/completions',
        {
            method:'POST',
            headers:{
                'Content-Type':'application/json',
                'Authorization':`Bearer ${groqKey}`
            },
            body:JSON.stringify({
                model:'llama-3.3-70b-versatile',
                max_tokens:1200,
                temperature:0.1,
                messages:[
                    {
                        role:'user',
                        content:prompt
                    }
                ]
            })
        }
    );

    if(!response.ok){

        const err =
            await response.text();

        throw new Error(err);
    }

    const data =
        await response.json();

    const raw =
        data.choices?.[0]?.message?.content || '';

    const clean = raw
        .replace(/```json/g,'')
        .replace(/```/g,'')
        .trim();

    return JSON.parse(clean);
}

async function analyseTranscription(){

    try{

        const text =
            document
                .getElementById('result')
                .value
                .trim();

        if(!text){

            alert('Aucune transcription');

            return;
        }

        document
            .getElementById('analyseBtn')
            .disabled = true;

        document
            .getElementById('analyseStatus')
            .textContent =
            '⏳ Analyse en cours...';

        const chunks =
            splitTextIntoChunks(text, 12000);

        let finalResume = '';
        let finalDecisions = '';
        let finalActions = '';

        for(let i=0; i<chunks.length; i++){

            document
                .getElementById('analyseStatus')
                .textContent =
                `⏳ Analyse partie ${i+1}/${chunks.length}`;

            const result =
                await analyseChunk(chunks[i]);

            finalResume +=
                '\n\n' + (result.resume || '');

            finalDecisions +=
                '\n' + (result.decisions || '');

            finalActions +=
                '\n' + (result.actions || '');
        }

        document
            .getElementById('resumeContent')
            .textContent = finalResume;

        document
            .getElementById('decisionsContent')
            .textContent = finalDecisions;

        document
            .getElementById('actionsContent')
            .textContent = finalActions;

        document
            .getElementById('analyseResult')
            .style.display = 'block';

        document
            .getElementById('analyseStatus')
            .textContent =
            '✅ Analyse terminée';

    }catch(err){

        console.error(err);

        document
            .getElementById('analyseStatus')
            .textContent =
            '❌ ' + err.message;

    }finally{

        document
            .getElementById('analyseBtn')
            .disabled = false;
    }
}

/* TELECHARGEMENT */

function downloadTxt(){

    const text =
        document
            .getElementById('result')
            .value;

    if(!text.trim()){

        alert('Aucune transcription');

        return;
    }

    const blob = new Blob(
        [text],
        {
            type:'text/plain;charset=utf-8'
        }
    );

    const url =
        URL.createObjectURL(blob);

    const a =
        document.createElement('a');

    a.href = url;

    a.download =
        'transcription.txt';

    document.body.appendChild(a);

    a.click();

    document.body.removeChild(a);

    URL.revokeObjectURL(url);
}

/* IMPORT TXT */

function importTxtFile(e){

    const file =
        e.target.files[0];

    if(!file) return;

    const reader =
        new FileReader();

    reader.onload = (ev)=>{

        document
            .getElementById('result')
            .value =
            ev.target.result;

        document
            .getElementById('downloadBtn')
            .disabled = false;

        setStatus(
            '📂 Transcription chargée',
            'success'
        );
    };

    reader.readAsText(file, 'utf-8');
}

/* EVENTS */

window.addEventListener(
    'DOMContentLoaded',
    ()=>{

        document
            .getElementById('startBtn')
            .addEventListener(
                'click',
                async ()=>{

                    try{

                        const fileInput =
                            document.getElementById('audioFile');

                        if(!fileInput.files.length){

                            alert('Sélectionne un fichier');

                            return;
                        }

                        const valid =
                            await validateGroqKey();

                        if(!valid){

                            throw new Error(
                                'Clé API invalide'
                            );
                        }

                        document
                            .getElementById('liveCursor')
                            .style.display = 'block';

                        const file =
                            fileInput.files[0];

                        const finalText =
                            await splitAndTranscribe(file);

                        document
                            .getElementById('result')
                            .value = finalText;

                        document
                            .getElementById('downloadBtn')
                            .disabled = false;

                        document
                            .getElementById('liveCursor')
                            .style.display = 'none';

                        setStatus(
                            '✅ Transcription terminée',
                            'success'
                        );

                    }catch(err){

                        console.error(err);

                        setStatus(
                            err.message,
                            'error'
                        );

                    }finally{

                        document
                            .getElementById('liveCursor')
                            .style.display = 'none';
                    }
                }
            );

        document
            .getElementById('pauseBtn')
            .addEventListener(
                'click',
                ()=>{

                    isPaused = !isPaused;

                    document
                        .getElementById('pauseBtn')
                        .textContent =
                        isPaused
                        ? '▶ Reprendre'
                        : '⏸ Pause';
                }
            );

        document
            .getElementById('analyseBtn')
            .addEventListener(
                'click',
                analyseTranscription
            );

        document
            .getElementById('downloadBtn')
            .addEventListener(
                'click',
                downloadTxt
            );

        document
            .getElementById('importTxt')
            .addEventListener(
                'change',
                importTxtFile
            );
    }
);

</script>

</body>
</html>
