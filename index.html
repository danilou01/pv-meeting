<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PV Meeting - Transcription Groq</title>
<script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
<style>
body{ margin:0; padding:40px; background:#0f172a; color:white; font-family:Arial,sans-serif; }
.container{ max-width:1000px; margin:auto; background:#111827; padding:30px; border-radius:20px; }
h1{ color:#38bdf8; }
.field{ margin-bottom:20px; }
label{ display:block; margin-bottom:8px; font-weight:bold; }
input[type="password"], input[type="file"]{
    width:100%; padding:12px; border-radius:10px;
    border:1px solid #334155; background:#1e293b; color:white; box-sizing:border-box;
}
button{ background:#0ea5e9; color:white; border:none; padding:14px 20px; border-radius:10px; cursor:pointer; font-size:16px; font-weight:bold; }
button:hover{ background:#0284c7; }
#apiBadge{ display:inline-block; margin-top:10px; padding:8px 12px; border-radius:999px; background:#dc2626; font-size:14px; font-weight:bold; }
.status{ margin-top:20px; color:#cbd5e1; }
.success{ color:#22c55e; }
.error{ color:#ef4444; }
.debug{ margin-top:10px; padding:10px; background:#1e293b; border-radius:8px; font-size:13px; color:#94a3b8; max-height:150px; overflow-y:auto; font-family:monospace; }
textarea{ width:100%; min-height:450px; margin-top:20px; padding:15px; border-radius:12px; border:1px solid #334155; background:#020617; color:#e2e8f0; resize:vertical; box-sizing:border-box; }
#liveCursor{ display:none; margin-top:10px; color:#38bdf8; font-weight:bold; }
.progressBar{ width:100%; height:20px; background:#1e293b; border-radius:999px; overflow:hidden; margin-top:20px; }
.progressFill{ height:100%; width:0%; background:#0ea5e9; transition:width .3s; }
</style>
</head>
<body>
<div class="container">
<h1>🎙️ PV Meeting - Transcription Longue</h1>

<div class="field">
    <label>Clé API Groq</label>
    <input id="groqApiKey" type="password" placeholder="gsk_...">
    <div id="apiBadge">API invalide</div>
</div>
<div class="field">
    <label>Clé API Anthropic (optionnel)</label>
    <input id="anthropicApiKey" type="password" placeholder="sk-ant-...">
</div>
<div class="field">
    <label>Fichier audio / vidéo</label>
    <input id="audioFile" type="file" accept="audio/*,video/*">
</div>

<button id="startBtn">Lancer la transcription</button>

<div class="status" id="status"></div>
<div id="liveCursor">⏺ Transcription en cours...</div>
<div class="progressBar"><div class="progressFill" id="progressFill"></div></div>
<div class="debug" id="debugLog">📋 Journal de bord...</div>
<textarea id="result" placeholder="La transcription apparaîtra ici..."></textarea>
</div>

<script>
const { createFFmpeg, fetchFile } = FFmpeg;

function log(msg){
    console.log(msg);
    const el = document.getElementById('debugLog');
    el.innerHTML += '<br>' + msg;
    el.scrollTop = el.scrollHeight;
}

function setStatus(message, type=''){
    const el = document.getElementById('status');
    el.className = `status ${type}`;
    el.textContent = message;
    log('▶ ' + message);
}

function updateProgress(percent){
    document.getElementById('progressFill').style.width = percent + '%';
}

function updateApiBadge(ok, message=''){
    const badge = document.getElementById('apiBadge');
    badge.textContent = message || (ok ? 'Groq connecté' : 'API invalide');
    badge.style.background = ok ? '#16a34a' : '#dc2626';
}

function getGroqKey(){
    return document.getElementById('groqApiKey').value.trim();
}

async function validateGroqKey(){
    const apiKey = getGroqKey();
    if(!apiKey){ updateApiBadge(false,'Clé manquante'); return false; }
    try{
        const response = await fetch('https://api.groq.com/openai/v1/models',{
            method:'GET', headers:{ Authorization:`Bearer ${apiKey}` }
        });
        if(!response.ok){ updateApiBadge(false,'Clé refusée'); return false; }
        updateApiBadge(true,'Groq connecté');
        return true;
    }catch(err){
        updateApiBadge(false,'Erreur réseau');
        return false;
    }
}

function animateLiveCursor(){
    const cursor = document.getElementById('liveCursor');
    cursor.style.display='block';
    let dots=0;
    window.__cursorInterval = setInterval(()=>{
        dots=(dots+1)%4;
        cursor.textContent = '⏺ Transcription en cours' + '.'.repeat(dots);
    },500);
}

function stopLiveCursor(){
    clearInterval(window.__cursorInterval);
    document.getElementById('liveCursor').style.display='none';
}

function sleep(ms){
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function sendChunkToGroq(file, tentative=1){
    const apiKey = getGroqKey();
    log(`📤 Envoi Groq : ${file.name} (${Math.round(file.size/1024)} Ko)`);
    const formData = new FormData();
    formData.append('file', file);
    formData.append('model', 'whisper-large-v3');
    formData.append('response_format', 'verbose_json');
    const response = await fetch('https://api.groq.com/openai/v1/audio/transcriptions',{
        method:'POST',
        headers:{ Authorization:`Bearer ${apiKey}` },
        body:formData
    });

    // 429 = trop de requêtes → on attend et on réessaie
    if(response.status === 429){
        const attente = tentative * 15; // 15s, 30s, 45s...
        log(`⏳ Limite Groq atteinte, attente ${attente}s (tentative ${tentative}/5)...`);
        setStatus(`Pause ${attente}s (limite API)...`);
        await sleep(attente * 1000);
        if(tentative >= 5) throw new Error('Limite Groq dépassée après 5 tentatives');
        return sendChunkToGroq(file, tentative + 1);
    }

    if(!response.ok){
        const errText = await response.text();
        log('❌ Erreur Groq : ' + errText);
        throw new Error(`Erreur Groq ${response.status}`);
    }
    const json = await response.json();
    log(`✅ Texte reçu : "${(json.text||'').substring(0,60)}..."`);
    return json;
}

async function splitAndTranscribe(file){

    const ffmpeg = createFFmpeg({
        log: false,
        corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js'
    });

    setStatus('Chargement moteur FFmpeg...');
    await ffmpeg.load();
    log('✅ FFmpeg chargé');

    setStatus('Chargement fichier...');
    ffmpeg.FS('writeFile', file.name, await fetchFile(file));
    log(`✅ Fichier écrit : ${file.name}`);

    // ✅ On extrait en WAV (toujours supporté) puis on découpe
    setStatus('Extraction audio WAV...');
    await ffmpeg.run(
        '-i', file.name,
        '-vn',
        '-acodec', 'pcm_s16le',
        '-ar', '16000',
        '-ac', '1',
        'audio.wav'
    );
    log('✅ WAV extrait');

    setStatus('Découpage en morceaux de 5 min...');
    await ffmpeg.run(
        '-i', 'audio.wav',
        '-f', 'segment',
        '-segment_time', '300',
        '-c', 'copy',
        'chunk_%03d.wav'
    );

    const files = ffmpeg.FS('readdir', '/');
    log('📁 Fichiers : ' + files.join(', '));

    const chunks = files.filter(name => name.startsWith('chunk_')).sort();
    log(`✅ ${chunks.length} morceau(x) : ${chunks.join(', ')}`);

    if(chunks.length === 0){
        throw new Error('Aucun morceau créé — format non supporté ?');
    }

    let finalText = '';

    for(let i=0; i<chunks.length; i++){
        const percent = Math.floor(((i+1)/chunks.length)*100);
        updateProgress(percent);
        setStatus(`Transcription ${i+1}/${chunks.length}...`);

        const data = ffmpeg.FS('readFile', chunks[i]);
        log(`📦 ${chunks[i]} : ${Math.round(data.length/1024)} Ko`);

        const blob = new Blob([data.buffer], {type:'audio/wav'});
        const chunkFile = new File([blob], chunks[i].replace('.wav','.wav'), {type:'audio/wav'});

        const json = await sendChunkToGroq(chunkFile);
        finalText += '\n' + (json.text || '');

        const textarea = document.getElementById('result');
        textarea.value = finalText;
        textarea.scrollTop = textarea.scrollHeight;

        // Pause 3s entre morceaux pour éviter le 429
        if(i < chunks.length - 1){
            log('⏸ Pause 3s avant le prochain morceau...');
            await sleep(3000);
        }
    }

    return finalText;
}

async function startTranscription(){
    document.getElementById('debugLog').innerHTML = '📋 Démarrage...';
    try{
        const fileInput = document.getElementById('audioFile');
        if(!fileInput.files.length){ alert('Sélectionne un fichier'); return; }

        const f = fileInput.files[0];
        log(`📂 ${f.name} — ${Math.round(f.size/1024/1024)} Mo`);

        const valid = await validateGroqKey();
        if(!valid) throw new Error('Clé Groq invalide');

        animateLiveCursor();
        const finalText = await splitAndTranscribe(f);
        document.getElementById('result').value = finalText;
        stopLiveCursor();
        updateProgress(100);
        setStatus('Transcription terminée ✅','success');

    }catch(err){
        console.error(err);
        stopLiveCursor();
        log('💥 ERREUR : ' + err.message);
        setStatus(err.message || 'Erreur','error');
    }
}

window.addEventListener('DOMContentLoaded', ()=>{
    document.getElementById('startBtn').addEventListener('click', startTranscription);
    document.getElementById('groqApiKey').addEventListener('input', ()=>{
        clearTimeout(window.__groqTimer);
        window.__groqTimer = setTimeout(()=>{ validateGroqKey(); }, 500);
    });
});
</script>
</body>
</html>
